name: Daily Stock Report

on:
  schedule:
    - cron: "0 22 * * 0-4"   # Mon–Fri 07:00 KST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          sudo apt-get install -y libxml2-dev libxslt-dev
          pip install -r requirements.txt

      - name: Diagnose — Python version and imports
        run: |
          python --version
          python -c "
          import sys
          try:
              import anthropic, requests, bs4, lxml, dotenv, reportlab
              print('OK: all imports succeeded')
          except ImportError as e:
              print(f'::error::Import failed: {e}')
              sys.exit(1)
          "

      - name: Diagnose — check secrets
        env:
          DART_API_KEY:      ${{ secrets.DART_API_KEY }}
          KIS_APP_KEY:       ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:    ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:    ${{ secrets.KIS_ACCOUNT_NO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER:      ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
        run: |
          python -c "
          import os, sys
          required = [
              'DART_API_KEY','KIS_APP_KEY','KIS_APP_SECRET','KIS_ACCOUNT_NO',
              'ANTHROPIC_API_KEY','GMAIL_SENDER','GMAIL_APP_PASSWORD','REPORT_RECIPIENTS',
          ]
          missing = [k for k in required if not os.environ.get(k)]
          if missing:
              for k in missing:
                  print(f'::error::Secret not set: {k}')
              sys.exit(1)
          print('OK: all secrets present')
          "

      - name: Run stock report agent
        env:
          DART_API_KEY:             ${{ secrets.DART_API_KEY }}
          KIS_APP_KEY:              ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:           ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:           ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PRODUCT_CODE: ${{ secrets.KIS_ACCOUNT_PRODUCT_CODE }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER:             ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENTS:        ${{ secrets.REPORT_RECIPIENTS }}
        run: |
          python -u main.py 2>&1 || {
            echo "::error::main.py exited with error — see step log above"
            exit 1
          }

      - name: Upload PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-report-${{ github.run_id }}
          path: "*.pdf"
          if-no-files-found: ignore
          retention-days: 7
